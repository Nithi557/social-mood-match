<!DOCTYPE html>
<html>
<head>
<title>Social Mood Match</title>
</head>

<body>

<h2>Social Mood Detector</h2>

<input type="text" id="textInput" placeholder="Enter your message">
<button onclick="analyzeMood()">Analyze Mood</button>

<p id="result"></p>

<script>
async function analyzeMood() {

let text = document.getElementById("textInput").value;

let response = await fetch("http://127.0.0.1:5000/analyze", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({ text: text })
});

let data = await response.json();

document.getElementById("result").innerText =
"Mood: " + data.mood;

}
</script>

</body>
</html>
